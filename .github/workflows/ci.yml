name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    name: Build and Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        java: ['21']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: maven

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build with Maven (skip jacoco check)
        shell: bash
        run: mvn clean install -Djacoco.skip=true -B -V

      - name: Run tests
        shell: bash
        run: mvn test -Djacoco.skip=true -B

      - name: Generate coverage report
        shell: bash
        run: mvn jacoco:report -Djacoco.skip=false
        continue-on-error: true

      - name: Archive test results
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}-${{ matrix.java }}
          path: |
            **/target/surefire-reports/
            **/target/site/jacoco/

      - name: Archive JAR files
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: jars-${{ matrix.os }}
          path: |
            cli/target/spring-test-gen.jar
            core/target/*.jar

  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Check code formatting
        run: mvn spotless:check || true
        continue-on-error: true

      - name: Analyze dependencies
        run: mvn dependency:analyze
        continue-on-error: true

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run integration tests
        shell: bash
        run: mvn verify -Djacoco.skip=true -B

      - name: Test CLI JAR
        shell: bash
        run: |
          java -jar cli/target/spring-test-gen.jar --version
          java -jar cli/target/spring-test-gen.jar --help

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [build, code-quality, integration-test]
    if: always()

    steps:
      - name: Check build status
        run: |
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "Build failed"
            exit 1
          fi
          echo "All CI checks passed!"
