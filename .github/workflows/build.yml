name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    name: Build and Test
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        # Temporarily exclude Windows until we fix the build issue
        os: [ubuntu-latest, macos-latest]
        java: ['21']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: maven

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build with Maven (skip jacoco check)
        run: mvn clean install -Djacoco.skip=true -B -V

      - name: Run tests
        run: mvn test -Djacoco.skip=true -B

      - name: Generate coverage report
        run: mvn jacoco:report -Djacoco.skip=false
        continue-on-error: true

      # Codecov disabled until token is configured
      # - name: Upload coverage to Codecov
      #   uses: codecov/codecov-action@v4
      #   continue-on-error: true
      #   with:
      #     files: ./core/target/site/jacoco/jacoco.xml,./cli/target/site/jacoco/jacoco.xml
      #     flags: unittests
      #     name: codecov-umbrella

      - name: Archive test results
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}-${{ matrix.java }}
          path: |
            **/target/surefire-reports/
            **/target/site/jacoco/

      - name: Archive JAR files
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: jars-${{ matrix.os }}
          path: |
            cli/target/*.jar
            core/target/*.jar

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run SpotBugs
        run: mvn spotbugs:check || true
        continue-on-error: true

      - name: Run Checkstyle
        run: mvn checkstyle:check || true
        continue-on-error: true

      - name: Verify code coverage
        run: mvn jacoco:check || true
        continue-on-error: true

  dependency-check:
    name: Dependency Security Check
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Check dependencies
        run: mvn dependency:analyze
        continue-on-error: true