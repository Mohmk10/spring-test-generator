name: Publish to Maven Central

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.0.0)'
        required: true
        type: string

jobs:
  publish:
    name: Publish to Maven Central
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          server-id: ossrh
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Set version
        run: mvn versions:set -DnewVersion=${{ github.event.inputs.version }} -B

      - name: Build and test
        run: mvn clean verify -Djacoco.skip=true -B

      - name: Publish to Maven Central
        run: mvn clean deploy -P release -DskipTests -B
        env:
          MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.OSSRH_TOKEN }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Create Git tag
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag -a v${{ github.event.inputs.version }} -m "Release v${{ github.event.inputs.version }}"
          git push origin v${{ github.event.inputs.version }}

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.event.inputs.version }}
          release_name: Release v${{ github.event.inputs.version }}
          body: |
            ## Spring Boot Test Generator v${{ github.event.inputs.version }}
            
            Published to Maven Central!
            
            ### Maven
            ```xml
            <dependency>
                <groupId>com.springtest</groupId>
                <artifactId>spring-test-generator-core</artifactId>
                <version>${{ github.event.inputs.version }}</version>
            </dependency>
            ```
            
            ### Gradle
            ```gradle
            implementation 'com.springtest:spring-test-generator-core:${{ github.event.inputs.version }}'
            ```
            
            See [CHANGELOG.md](https://github.com/Mohmk10/spring-test-generator/blob/main/CHANGELOG.md) for details.
          draft: false
          prerelease: false

      - name: Upload CLI JAR to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./cli/target/spring-test-gen.jar
          asset_name: spring-test-gen.jar
          asset_content_type: application/java-archive