name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          server-id: ossrh
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Extract version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update version in pom.xml
        run: mvn versions:set -DnewVersion=${{ steps.get_version.outputs.VERSION }}

      - name: Build with Maven
        run: mvn clean package -DskipTests -B -V

      - name: Run tests
        run: mvn test -B

      - name: Create Release JAR
        run: |
          mkdir -p release
          cp cli/target/spring-test-generator-cli-*.jar release/spring-test-gen.jar
          cp core/target/spring-test-generator-core-*.jar release/

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ steps.get_version.outputs.VERSION }}
          draft: false
          prerelease: false
          body: |
            ## Spring Boot Test Generator ${{ steps.get_version.outputs.VERSION }}
            
            ### Installation
  ```bash
  curl -L https://github.com/Mohmk10/spring-test-generator/releases/download/${{ github.ref_name }}/spring-test-gen.jar -o spring-test-gen.jar
  java -jar spring-test-gen.jar --version
  ```
  
  ### What's Changed
  
  See [CHANGELOG.md](https://github.com/Mohmk10/spring-test-generator/blob/main/CHANGELOG.md)

- name: Upload CLI JAR
  uses: actions/upload-release-asset@v1
  env:
    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  with:
    upload_url: ${{ steps.create_release.outputs.upload_url }}
    asset_path: ./release/spring-test-gen.jar
    asset_name: spring-test-gen.jar
    asset_content_type: application/java-archive

- name: Upload Core JAR
  uses: actions/upload-release-asset@v1
  env:
    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  with:
    upload_url: ${{ steps.create_release.outputs.upload_url }}
    asset_path: ./release/spring-test-generator-core-${{ steps.get_version.outputs.VERSION }}.jar
    asset_name: spring-test-generator-core-${{ steps.get_version.outputs.VERSION }}.jar
    asset_content_type: application/java-archive

publish-maven-central:
  name: Publish to Maven Central
  runs-on: ubuntu-latest
  needs: build

  steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
        server-id: ossrh
        server-username: MAVEN_USERNAME
        server-password: MAVEN_PASSWORD
        gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
        gpg-passphrase: GPG_PASSPHRASE

    - name: Extract version from tag
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Update version
      run: mvn versions:set -DnewVersion=${{ steps.get_version.outputs.VERSION }}

    - name: Publish to Maven Central
      run: mvn clean deploy -P release -DskipTests
      env:
        MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
        MAVEN_PASSWORD: ${{ secrets.OSSRH_TOKEN }}
        GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}